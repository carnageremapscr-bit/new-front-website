<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Carnage Remaps</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b0b0b 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 6rem;
            margin-bottom: 1rem;
            color: #f5c400;
            text-shadow: 0 2px 10px rgba(245, 196, 0, 0.3);
        }
        h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }
        .nav-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }
        a {
            display: inline-block;
            padding: 1rem 2rem;
            background: #f5c400;
            color: #0b0b0b;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        a:hover {
            background: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(245, 196, 0, 0.3);
        }
        .logo {
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 4rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .nav-links {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚗</div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Sorry, the page you're looking for doesn't exist. Let's get you back on track!</p>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/services.html">Services</a>
            <a href="/vehicle-search.html">Vehicle Search</a>
            <a href="/contact.html">Contact</a>
        </div>
        <p style="margin-top: 3rem; font-size: 1rem; color: rgba(255, 255, 255, 0.6);">
            Need help? Call us at <a href="tel:07546371963" style="color: #f5c400; text-decoration: none;">07546 371963</a>
        </p>
    </div>
</body>
</html>
